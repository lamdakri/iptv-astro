<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-and" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#052e16;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent-and" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg-and)" rx="16"/>
  <!-- Smartphone -->
  <rect x="290" y="60" width="100" height="220" rx="20" fill="#1e293b" stroke="url(#accent-and)" stroke-width="2"/>
  <rect x="300" y="80" width="80" height="140" rx="8" fill="#0f172a"/>
  <!-- TV content on phone -->
  <text x="340" y="120" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="10">4K</text>
  <text x="340" y="140" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="8">IPTV</text>
  <rect x="310" y="155" width="60" height="4" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="310" y="165" width="40" height="3" rx="1.5" fill="#22d3ee" opacity="0.3"/>
  <rect x="310" y="175" width="50" height="3" rx="1.5" fill="#22c55e" opacity="0.3"/>
  <!-- Home button -->
  <circle cx="340" cy="250" r="8" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Tablet -->
  <rect x="430" y="80" width="130" height="180" rx="16" fill="#1e293b" stroke="url(#accent-and)" stroke-width="2"/>
  <rect x="445" y="95" width="100" height="120" rx="6" fill="#0f172a"/>
  <polygon points="475,130 475,180 515,155" fill="url(#accent-and)" opacity="0.7"/>
  <!-- Channel bars -->
  <rect x="450" y="230" width="90" height="6" rx="3" fill="#22c55e" opacity="0.3"/>
  <rect x="450" y="242" width="60" height="4" rx="2" fill="#22d3ee" opacity="0.2"/>
  <!-- Connection line -->
  <path d="M390 170 Q410 130 430 140" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" letter-spacing="3">ANDROID IPTV</text>
  <circle cx="120" cy="120" r="50" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.08"/>
  <circle cx="680" cy="280" r="40" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.08"/>
</svg>