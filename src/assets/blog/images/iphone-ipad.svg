<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-ios" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1c1917;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent-ios" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg-ios)" rx="16"/>
  <!-- iPhone -->
  <rect x="310" y="50" width="80" height="240" rx="24" fill="#1e293b" stroke="url(#accent-ios)" stroke-width="2"/>
  <!-- Notch -->
  <rect x="330" y="65" width="40" height="8" rx="4" fill="#0f172a"/>
  <!-- Screen -->
  <rect x="322" y="85" width="56" height="120" rx="6" fill="#0f172a"/>
  <!-- App icons on screen -->
  <rect x="328" y="92" width="20" height="20" rx="4" fill="#22d3ee" opacity="0.6"/>
  <rect x="354" y="92" width="20" height="20" rx="4" fill="#f97316" opacity="0.6"/>
  <rect x="328" y="118" width="20" height="20" rx="4" fill="#818cf8" opacity="0.6"/>
  <rect x="354" y="118" width="20" height="20" rx="4" fill="#22c55e" opacity="0.6"/>
  <!-- IPTVX label -->
  <text x="350" y="160" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="8" font-weight="bold">IPTVX</text>
  <!-- Home button area -->
  <rect x="340" y="262" width="20" height="4" rx="2" fill="#475569"/>
  <!-- iPad -->
  <rect x="430" y="80" width="140" height="180" rx="14" fill="#1e293b" stroke="url(#accent-ios)" stroke-width="2"/>
  <rect x="445" y="95" width="110" height="120" rx="6" fill="#0f172a"/>
  <polygon points="485,130 485,180 525,155" fill="url(#accent-ios)" opacity="0.7"/>
  <!-- Connection arrow -->
  <path d="M390 170 Q410 140 430 150" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" letter-spacing="3">iOS IPTV</text>
  <circle cx="80" cy="100" r="40" fill="none" stroke="#f97316" stroke-width="1" opacity="0.1"/>
  <circle cx="720" cy="300" r="50" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.1"/>
</svg>