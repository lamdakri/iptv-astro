<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-cmp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent-cmp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg-cmp)" rx="16"/>
  <!-- Left: Cable TV box (old) -->
  <rect x="100" y="70" width="250" height="220" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2" opacity="0.7"/>
  <rect x="120" y="90" width="210" height="60" rx="6" fill="#0f172a"/>
  <text x="225" y="125" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14" font-weight="bold">CABLE TV</text>
  <text x="225" y="145" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="10">$80 - $150/mo</text>
  <line x1="120" y1="170" x2="330" y2="170" stroke="#334155" stroke-width="1"/>
  <rect x="140" y="185" width="180" height="8" rx="4" fill="#475569" opacity="0.5"/>
  <rect x="140" y="200" width="150" height="8" rx="4" fill="#475569" opacity="0.4"/>
  <rect x="140" y="215" width="120" height="8" rx="4" fill="#475569" opacity="0.3"/>
  <rect x="140" y="230" width="160" height="8" rx="4" fill="#475569" opacity="0.3"/>
  <text x="225" y="265" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="10">✗ Hidden fees</text>
  <text x="225" y="280" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="10">✗ 12-24 month contract</text>
  <!-- VS badge -->
  <circle cx="400" cy="180" r="35" fill="url(#accent-cmp)"/>
  <text x="400" y="175" text-anchor="middle" fill="#0f172a" font-family="system-ui" font-size="11" font-weight="bold">VS</text>
  <!-- Right: IPTV box (new) -->
  <rect x="450" y="70" width="250" height="220" rx="12" fill="#1e293b" stroke="url(#accent-cmp)" stroke-width="2"/>
  <rect x="470" y="90" width="210" height="60" rx="6" fill="#0f172a"/>
  <text x="575" y="125" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="14" font-weight="bold">IPTV 4K</text>
  <text x="575" y="145" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="10">€9.99 - €19.99/mo</text>
  <line x1="470" y1="170" x2="680" y2="170" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <rect x="490" y="185" width="180" height="8" rx="4" fill="#22d3ee" opacity="0.6"/>
  <rect x="490" y="200" width="150" height="8" rx="4" fill="#818cf8" opacity="0.5"/>
  <rect x="490" y="215" width="120" height="8" rx="4" fill="#22d3ee" opacity="0.4"/>
  <rect x="490" y="230" width="160" height="8" rx="4" fill="#818cf8" opacity="0.4"/>
  <text x="575" y="265" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="10">✓ No hidden fees</text>
  <text x="575" y="280" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="10">✓ Month-to-month</text>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" letter-spacing="3">IPTV VS CABLE</text>
</svg>