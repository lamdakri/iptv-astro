<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-guide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent-guide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="tv-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg-guide)" rx="16"/>
  <!-- TV Screen -->
  <rect x="200" y="80" width="400" height="230" rx="12" fill="#1e293b" stroke="url(#accent-guide)" stroke-width="2"/>
  <rect x="220" y="100" width="360" height="180" rx="6" fill="#0f172a"/>
  <!-- Play button on screen -->
  <polygon points="380,160 380,220 430,190" fill="url(#accent-guide)" opacity="0.8"/>
  <!-- Streaming bars -->
  <rect x="460" y="150" width="4" height="40" rx="2" fill="#22d3ee" opacity="0.6"/>
  <rect x="472" y="140" width="4" height="60" rx="2" fill="#818cf8" opacity="0.8"/>
  <rect x="484" y="155" width="4" height="30" rx="2" fill="#22d3ee" opacity="0.6"/>
  <rect x="496" y="145" width="4" height="50" rx="2" fill="#818cf8" opacity="0.7"/>
  <!-- TV Stand -->
  <rect x="350" y="310" width="100" height="8" rx="4" fill="#334155"/>
  <rect x="380" y="318" width="40" height="15" rx="3" fill="#334155"/>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" letter-spacing="3">GUIDE IPTV</text>
  <!-- Circles decoration -->
  <circle cx="80" cy="80" r="40" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <circle cx="720" cy="320" r="60" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.15"/>
  <circle cx="150" cy="350" r="20" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.1"/>
  <circle cx="680" cy="60" r="25" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.1"/>
</svg>